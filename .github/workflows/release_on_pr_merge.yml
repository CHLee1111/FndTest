name: Release on PR merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-on-pr-merge
  cancel-in-progress: false

jobs:
  release:
    name: Create version tag and GitHub release
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get release tag from branch
        id: version
        env:
          RELEASE_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          if [[ ! "$RELEASE_BRANCH" =~ ^release/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release branch: $RELEASE_BRANCH"
            echo "Expected format: release/vx.y.z, where x, y, and z are numbers."
            exit 1
          fi

          echo "tag=$RELEASE_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        env:
          TAG_NAME: ${{ steps.version.outputs.tag }}
          RELEASE_COMMIT: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          git fetch --tags --force

          if git rev-parse "refs/tags/$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG_NAME"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG_NAME" "${RELEASE_COMMIT:-$GITHUB_SHA}"
          git push origin "$TAG_NAME"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG_NAME" \
            --generate-notes
